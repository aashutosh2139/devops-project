name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPO:   devops-project-app
  EKS_CLUSTER: devops-project-eks

jobs:

  # ── Job 1: Test ────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package.json

      - name: Install dependencies
        run: cd app && npm ci

      - name: Run tests
        run: cd app && npm test

  # ── Job 2: Build + Scan + Push ─────────────────
  build:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: test                    # only runs if test passes
    if: github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      ecr_url:   ${{ steps.login.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag (git SHA)
        id: tag
        run: echo "tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }} \
            -t ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:latest \
            ./app

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0   # set to 1 to block on CVEs

      - name: Push image to ECR
        run: |
          docker push ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}
          docker push ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:latest

      - name: Update K8s manifest with new image tag
        run: |
          sed -i "s|image:.*|image: ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}|" \
            k8s/base/deployment.yaml
          git config user.email "ci@github.com"
          git config user.name  "GitHub Actions"
          git add k8s/base/deployment.yaml
          git commit -m "ci: update image to ${{ steps.tag.outputs.tag }}"
          git push

  # ── Job 3: Verify deployment ───────────────────
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for ArgoCD to sync
        run: sleep 30

      - name: Verify pods are running
        run: |
          kubectl rollout status deployment/devops-app -n production --timeout=5m
          kubectl get pods -n production
