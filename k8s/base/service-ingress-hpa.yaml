# ── Service: internal load balancer ─────────────
apiVersion: v1
kind: Service
metadata:
  name: devops-app-svc
  namespace: production
spec:
  selector:
    app: devops-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP   # only reachable inside cluster, ALB routes to it
---
# ── Ingress: exposes app to internet via ALB ────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-app-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-app-svc
                port:
                  number: 80
---
# ── HPA: auto-scale pods based on CPU ───────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-app-hpa
  namespace: production
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70  # scale up when CPU > 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80  # scale up when memory > 80%
---
# ── PodDisruptionBudget: always keep 1 pod up ───
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: devops-app-pdb
  namespace: production
spec:
  minAvailable: 1       # during node drain, keep at least 1 pod running
  selector:
    matchLabels:
      app: devops-app
---
# ── RBAC: least privilege for service account ───
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: devops-app-role
  namespace: production
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list"]   # only read, never write
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-app-rolebinding
  namespace: production
subjects:
  - kind: ServiceAccount
    name: devops-app-sa
    namespace: production
roleRef:
  kind: Role
  name: devops-app-role
  apiGroup: rbac.authorization.k8s.io
---
# ── NetworkPolicy: restrict pod traffic ─────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: devops-app-netpol
  namespace: production
spec:
  podSelector:
    matchLabels:
      app: devops-app
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 3000   # only allow traffic on port 3000
  egress:
    - ports:
        - port: 443    # allow HTTPS out (AWS APIs, ECR)
        - port: 53     # allow DNS
