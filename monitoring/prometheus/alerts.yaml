apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: devops-app-alerts
  namespace: monitoring
spec:
  groups:
    - name: devops-app
      rules:

        - alert: HighErrorRate
          expr: |
            rate(http_requests_total{status=~"5.."}[5m])
            / rate(http_requests_total[5m]) > 0.05
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "High error rate detected"
            description: "Error rate above 5% for 2 minutes"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.99,
              rate(http_request_duration_seconds_bucket[5m])
            ) > 1
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High latency detected"
            description: "p99 latency above 1 second"

        - alert: PodRestartingTooMuch
          expr: |
            rate(kube_pod_container_status_restarts_total[15m]) > 0
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod {{ $labels.pod }} restarting"

        - alert: CPUThrottling
          expr: |
            rate(container_cpu_cfs_throttled_seconds_total[5m]) > 0.5
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "CPU throttling detected"
            description: "Container {{ $labels.container }} being throttled"
